name: FFmpeg 60fps (No Quality Loss)

on:
  workflow_dispatch:

jobs:
  transcode:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg
          ffmpeg -version 2>&1 | head -n1

      - name: Download video
        run: |
          echo "Downloading..."
          wget -O input.mov \
            https://download.blender.org/peach/bigbuckbunny_movies/big_buck_bunny_1080p_h264.mov 2>&1
          ls -lh input.mov

      - name: Probe source
        run: |
          ffprobe -hide_banner -i input.mov 2>&1 | grep -E "Stream|Duration|bitrate"

      - name: Transcode to 60fps (lossless)
        run: |
          echo "Started: $(date -u +%H:%M:%S) UTC"
          echo "Params:  libx264 crf=0 preset=veryslow  minterpolate 30->60fps"
          echo ""

          ffmpeg -nostdin \
            -i input.mov \
            -c:v libx264 -crf 0 -preset veryslow \
            -vf "minterpolate=fps=60:mi_mode=mci:mc_mode=aobmc:me_mode=bidir:me=epzs" \
            -c:a copy \
            -threads 0 \
            -stats \
            output.mkv 2>&1

          echo ""
          ls -lh output.mkv

      - name: Verify output
        run: |
          ffprobe -hide_banner -i output.mkv 2>&1 | grep -E "Stream|Duration|bitrate"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: big-buck-bunny-60fps-lossless
          path: output.mkv
          retention-days: 7
