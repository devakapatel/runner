name: SSH Access via Cloudflare Tunnel

on:
  workflow_dispatch:

jobs:
  ssh:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      TUNNEL_TOKEN: ${{ secrets.CLOUDFLARE_TUNNEL_TOKEN }}
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y dropbear

      - name: Configure SSH server with key auth
        run: |
          sudo apt-get install -y dropbear
          sudo mkdir -p /etc/dropbear
          sudo rm -f /etc/dropbear/dropbear_rsa_host_key /etc/dropbear/dropbear_ecdsa_host_key /etc/dropbear/dropbear_dss_host_key
          sudo dropbearkey -t rsa -f /etc/dropbear/dropbear_rsa_host_key
          sudo dropbearkey -t ecdsa -f /etc/dropbear/dropbear_ecdsa_host_key
          sudo dropbearkey -t dss -f /etc/dropbear/dropbear_dss_host_key
          mkdir -p /home/runner/.ssh
          echo "${{ secrets.SSH_PUBLIC_KEY }}" > /home/runner/.ssh/authorized_keys
          chmod 700 /home/runner/.ssh
          chmod 600 /home/runner/.ssh/authorized_keys
          chown -R runner:runner /home/runner/.ssh
          sudo dropbear -p 2222 -F -E &
          sleep 3
          ss -tlnp | grep :2222

      - name: Test local SSH connection
        run: |
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -i /home/runner/.ssh/authorized_keys -p 2222 runner@localhost exit
          echo "Local SSH test: SUCCESS"

      - name: Test Cloudflare tunnel connectivity
        run: |
          curl -s -o /dev/null -w "%{http_code}" --connect-timeout 10 http://localhost:20241/metrics || echo "Tunnel metrics endpoint not accessible (expected)"
          echo "Tunnel process check:"
          ps aux | grep cloudflared

      - name: Test local SSH connection
        run: |
          echo "Testing local SSH connection to dropbear..."
          timeout 10 ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=5 -i /home/runner/.ssh/authorized_keys runner@localhost -p 2222 "echo 'Local SSH works'" || echo "Local SSH test failed (expected if no key auth yet)"
          ss -tlnp | grep :2222

      - name: Test tunnel connectivity
        run: |
          echo "Checking cloudflared tunnel status..."
          curl -s http://localhost:20241/metrics | grep -E "tunnel|connections" || echo "Metrics endpoint check"
          echo "Tunnel should be forwarding ssh.cluster.qzz.io -> localhost:2222"

      - name: Start Cloudflare Tunnel
        run: |
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb
          cloudflared tunnel --no-autoupdate run --token "$TUNNEL_TOKEN" &
          sleep 5

      - name: Show connection info
        run: |
          echo "=== SSH Access Ready ==="
          echo "Connect: ssh runner@ssh.cluster.qzz.io"
          echo "Port: 22 (Cloudflare tunnels TCP 2222)"
          echo "Timeout: 360 minutes"
          sleep 21600