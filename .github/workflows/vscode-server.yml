name: VS Code Server (Ephemeral)

on:
  workflow_dispatch:

jobs:
  vscode-server:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - name: Install code-server
        run: |
          curl -fsSL https://code-server.dev/install.sh | sh

      - name: Start code-server
        run: |
          nohup code-server --auth none --bind-addr 0.0.0.0:8080 > /tmp/code-server.log 2>&1 &
          for i in $(seq 1 30); do
            if curl -s http://localhost:8080 >/dev/null 2>&1; then
              echo "code-server ready on port 8080"
              break
            fi
            sleep 1
          done

      - name: Install cloudflared
        run: |
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb

      - name: Start cloudflared tunnel (no token, random URL)
        id: tunnel
        run: |
          nohup cloudflared tunnel --url http://localhost:8080 > /tmp/cloudflared.log 2>&1 &
          for i in $(seq 1 60); do
            URL=$(grep -oP 'https://[a-zA-Z0-9-]+\.trycloudflare\.com' /tmp/cloudflared.log 2>/dev/null | head -1)
            if [ -n "$URL" ]; then
              echo "url=$URL" >> $GITHUB_OUTPUT
              echo "Tunnel URL: $URL"
              break
            fi
            sleep 1
          done

      - name: Connection Info
        run: |
          echo "================================================"
          echo "  VS Code Server ready!"
          echo "  URL: ${{ steps.tunnel.outputs.url }}"
          echo "  No auth required (ephemeral, no account)"
          echo "  Runs for up to 6 hours"
          echo "================================================"

      - name: Keep alive
        run: |
          while true; do
            sleep 60
            echo "[$(date)] Running... URL: ${{ steps.tunnel.outputs.url }}"
          done
