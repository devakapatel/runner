name: FFmpeg 60fps (No Quality Loss)

on:
  workflow_dispatch:

jobs:
  transcode:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg
          echo "ffmpeg $(ffmpeg -version 2>&1 | head -n1)"
          echo "python3 $(python3 --version)"

      - name: Download video
        run: |
          echo "Downloading Big Buck Bunny (1080p H.264)..."
          curl -sL -o input.mov \
            https://download.blender.org/peach/bigbuckbunny_movies/big_buck_bunny_1080p_h264.mov
          SZ=$(stat -c%s input.mov)
          echo "Done: $(numfmt --to=iec $SZ)  ($(ls -lh input.mov | awk '{print $5}'))"

      - name: Probe source
        run: |
          echo "=== Source ==="
          ffprobe -v quiet -print_format json -show_streams -show_format input.mov |
            python3 -c "
import json,sys
d=json.load(sys.stdin)
for s in d['streams']:
    c=s.get('codec_type','?')
    n=s.get('codec_name','?')
    w=s.get('width','?')
    h=s.get('height','?')
    fr=s.get('r_frame_rate','?')
    print(f'  [{c:5}] {n} {w}x{h} @ {fr} fps')
print(f'  Duration: {float(d[\"format\"][\"duration\"]):.1f}s')
print(f'  Size:     {int(d[\"format\"][\"size\"])/1e6:.0f} MB')
print(f'  Bitrate:  {float(d[\"format\"][\"bit_rate\"])/1e6:.0f} Mb/s')
"

      - name: Transcode to 60fps (lossless)
        run: |
          echo "=== Transcode ==="
          echo "  Started: $(date -u +%H:%M:%S) UTC"
          echo "  Params:  libx264 crf=0 preset=veryslow  minterpolate: 30->60fps"
          echo ""

          ffmpeg -nostdin \
            -i input.mov \
            -c:v libx264 -crf 0 -preset veryslow \
            -vf "minterpolate=fps=60:mi_mode=mci:mc_mode=aoblc:me_mode=bidir:me=epzs" \
            -c:a copy \
            -threads 0 \
            -stats \
            output.mkv 2>&1

          echo ""
          echo "=== Output ==="
          SZ=$(stat -c%s output.mkv 2>/dev/null || echo 0)
          echo "  Size: $(numfmt --to=iec $SZ)  ($(ls -lh output.mkv | awk '{print $5}'))"

      - name: Verify output
        run: |
          echo "=== Output streams ==="
          ffprobe -v quiet -print_format json -show_streams -show_format output.mkv |
            python3 -c "
import json,sys
d=json.load(sys.stdin)
for s in d['streams']:
    c=s.get('codec_type','?')
    n=s.get('codec_name','?')
    w=s.get('width','?')
    h=s.get('height','?')
    fr=s.get('r_frame_rate','?')
    print(f'  [{c:5}] {n} {w}x{h} @ {fr} fps')
print(f'  Duration: {float(d[\"format\"][\"duration\"]):.1f}s')
print(f'  Size:     {int(d[\"format\"][\"size\"])/1e6:.0f} MB')
print(f'  Bitrate:  {int(d[\"format\"][\"bit_rate\"])/1e6:.0f} Mb/s')
"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: big-buck-bunny-60fps-lossless
          path: output.mkv
          retention-days: 7
