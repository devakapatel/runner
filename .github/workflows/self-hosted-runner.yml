name: VNC Desktop via Cloudflare Tunnel

on:
  workflow_dispatch:
    inputs:
      resolution:
        description: 'Screen resolution (WxHxD)'
        required: false
        default: '1920x1080x24'
      tunnel_token:
        description: 'Cloudflare Tunnel Token'
        required: true

jobs:
  vnc:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      TUNNEL_TOKEN: ${{ secrets.CLOUDFLARE_TUNNEL_TOKEN }}
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb x11vnc novnc websockify xfce4 xfce4-goodies dbus-x11

      - name: Start Xvfb + XFCE + x11vnc + noVNC
        run: |
          Xvfb :99 -screen 0 ${{ inputs.resolution }} -ac +extension GLX +extension RANDR +extension RENDER &
          export DISPLAY=:99
          sleep 2
          dbus-daemon --session --fork --print-address > /tmp/dbus-session.txt
          export $(cat /tmp/dbus-session.txt | grep -E '^DBUS_SESSION_BUS_ADDRESS=')
          startxfce4 &
          sleep 5
          x11vnc -display :99 -forever -nopw -listen 0.0.0.0 -rfbport 5901 -noxdamage -noxfixes -noxkb -nowf &
          websockify --web /usr/share/novnc/ 6080 localhost:5901 &

      - name: Start Cloudflare Tunnel
        run: |
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb
          cloudflared tunnel --no-autoupdate run --token "$TUNNEL_TOKEN" &
          sleep 5

      - name: Show connection info
        run: |
          echo "=== VNC Desktop Ready ==="
          echo "Access via browser: https://vnc.cluster.qzz.io/vnc.html"
          echo "Or direct VNC: vnc://vnc.cluster.qzz.io (if TCP ingress configured)"
          echo "Resolution: ${{ inputs.resolution }}"
          echo "Timeout: 360 minutes"
          sleep 21600