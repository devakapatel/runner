name: Test Multi-Tunnel Runner

on:
  workflow_dispatch:
    inputs:
      runner_slot:
        description: 'Runner slot number (1-3)'
        required: true
        default: '1'
        type: choice
        options:
          - '1'
          - '2'
          - '3'

jobs:
  test-runner:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 jq curl

      - name: Resolve token for slot
        id: resolve-token
        run: |
          if [ "${{ inputs.runner_slot }}" = "1" ]; then
            echo "TUNNEL_TOKEN=${{ secrets.ONE }}" >> $GITHUB_OUTPUT
            echo "DOMAIN=1.cluster.qzz.io" >> $GITHUB_OUTPUT
          elif [ "${{ inputs.runner_slot }}" = "2" ]; then
            echo "TUNNEL_TOKEN=${{ secrets.TWO }}" >> $GITHUB_OUTPUT
            echo "DOMAIN=2.cluster.qzz.io" >> $GITHUB_OUTPUT
          elif [ "${{ inputs.runner_slot }}" = "3" ]; then
            echo "TUNNEL_TOKEN=${{ secrets.THREE }}" >> $GITHUB_OUTPUT
            echo "DOMAIN=3.cluster.qzz.io" >> $GITHUB_OUTPUT
          else
            echo "Invalid slot"
            exit 1
          fi
          echo "✅ Slot ${{ inputs.runner_slot }} -> ${{ steps.resolve-token.outputs.DOMAIN }}"

      - name: Start API Server (port 8080)
        env:
          RUNNER_SLOT: ${{ inputs.runner_slot }}
          RUNNER_DOMAIN: ${{ steps.resolve-token.outputs.DOMAIN }}
        run: |
          python3 tracker.py &
          TRACKER_PID=$!
          # Wait for readiness
          for i in {1..30}; do
            if curl -s --connect-timeout 2 http://localhost:8080/health >/dev/null 2>&1; then
              echo "✅ API Server ready on port 8080"
              break
            fi
            sleep 1
          done
          kill -0 $TRACKER_PID || { echo "❌ Server died"; exit 1; }

      - name: Start Cloudflare Tunnel
        env:
          TUNNEL_TOKEN: ${{ steps.resolve-token.outputs.TUNNEL_TOKEN }}
        run: |
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb
          nohup cloudflared tunnel --no-autoupdate run --token "$TUNNEL_TOKEN" > /tmp/tunnel.log 2>&1 &
          TUNNEL_PID=$!
          # Wait for tunnel
          for i in {1..60}; do
            if curl -s http://localhost:20241/metrics 2>/dev/null | grep -q "cloudflared_tunnel"; then
              echo "✅ Cloudflare Tunnel connected for ${{ steps.resolve-token.outputs.DOMAIN }}"
              break
            fi
            sleep 1
          done
          kill -0 $TUNNEL_PID || { echo "❌ Tunnel died"; cat /tmp/tunnel.log; exit 1; }

      - name: Test Local API
        run: |
          echo "=== Local API (localhost:8080) ==="
          curl -s http://localhost:8080/health | jq .
          curl -s http://localhost:8080/api/runners | jq .
          curl -s http://localhost:8080/api/stats | jq .

      - name: Test External Domain
        env:
          DOMAIN: ${{ steps.resolve-token.outputs.DOMAIN }}
        run: |
          echo "=== External Domain: https://${DOMAIN} ==="
          sleep 5
          curl -s --connect-timeout 10 --max-time 30 "https://${DOMAIN}/health" | jq . || echo "❌ Health failed"
          curl -s --connect-timeout 10 --max-time 30 "https://${DOMAIN}/api/runners" | jq . || echo "❌ Runners failed"
          curl -s --connect-timeout 10 --max-time 30 "https://${DOMAIN}/api/stats" | jq . || echo "❌ Stats failed"

      - name: Show Info
        if: always()
        env:
          DOMAIN: ${{ steps.resolve-token.outputs.DOMAIN }}
        run: |
          echo "=== Runner Slot ${{ inputs.runner_slot }} Ready ==="
          echo "📊 Dashboard: https://${DOMAIN}"
          echo "🔧 Local API: http://localhost:8080"
          echo "Timeout: 360 minutes"