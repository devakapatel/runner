name: Fleet Runner with Dashboard

on:
  workflow_dispatch:
    inputs:
      runner_labels:
        description: 'Runner labels (comma-separated)'
        required: false
        default: 'ubuntu,runner,fleet'

jobs:
  fleet:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    concurrency:
      group: fleet-tracker
      cancel-in-progress: false
    env:
      TUNNEL_TOKEN: ${{ secrets.CLOUDFLARE_TUNNEL_TOKEN }}
      TRACKER_URL: http://localhost:8080
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 jq curl

      - name: Start/Join Fleet Tracker (port 8080)
        run: |
          # Check if tracker already running on port 8080
          if curl -s --connect-timeout 2 http://localhost:8080/health >/dev/null 2>&1; then
            echo "✅ Tracker already running, joining existing"
          else
            echo "🚀 Starting new fleet tracker..."
            nohup python3 tracker.py > /tmp/tracker.log 2>&1 &
            TRACKER_PID=$!
            echo $TRACKER_PID > /tmp/tracker.pid
            # Wait for readiness
            for i in {1..30}; do
              if curl -s --connect-timeout 2 http://localhost:8080/health >/dev/null 2>&1; then
                echo "✅ Fleet Tracker ready on port 8080"
                break
              fi
              echo "  Waiting for tracker... ($i/30)"
              sleep 1
            done
            # Verify it's still alive and API works
            kill -0 $TRACKER_PID || { echo "❌ Tracker died"; cat /tmp/tracker.log; exit 1; }
            # Test API endpoint
            curl -s -X POST http://localhost:8080/api/register -H "Content-Type: application/json" -d '{"id":"test","labels":"test"}' | grep -q registered && echo "✅ API working" || { echo "❌ API not responding"; cat /tmp/tracker.log; exit 1; }
          fi

      - name: Start/Join Cloudflare Tunnel
        run: |
          # Check if cloudflared already running with our token
          if pgrep -f "cloudflared.*tunnel.*--token" >/dev/null; then
            echo "✅ Cloudflare tunnel already running, joining existing"
          else
            echo "🚀 Starting new Cloudflare tunnel..."
            curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
            sudo dpkg -i cloudflared.deb
            nohup cloudflared tunnel --no-autoupdate run --token "$TUNNEL_TOKEN" > /tmp/tunnel.log 2>&1 &
            TUNNEL_PID=$!
            echo $TUNNEL_PID > /tmp/tunnel.pid
            # Wait for tunnel connections
            for i in {1..30}; do
              if curl -s http://localhost:20241/metrics 2>/dev/null | grep -q "cloudflared_tunnel_connections"; then
                echo "✅ Cloudflare Tunnel connected"
                break
              fi
              sleep 1
            done
            kill -0 $TUNNEL_PID || { echo "❌ Tunnel died"; cat /tmp/tunnel.log; exit 1; }
          fi

- name: Register Runner with Fleet Tracker
        run: |
          RUNNER_ID="gh-${{ github.run_id }}-${{ github.run_attempt }}-$(hostname)-$RANDOM"
          echo "🔗 Registering runner: $RUNNER_ID"
          RESPONSE=$(curl -v --connect-timeout 5 --max-time 10 -X POST http://localhost:8080/api/register \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg id "$RUNNER_ID" \
              --arg labels "${{ inputs.runner_labels }}" \
              --arg os "$(uname -s)" \
              --arg arch "$(uname -m)" \
              --arg repo "${{ github.repository }}" \
              --arg run_id "${{ github.run_id }}" \
              '{id: $id, labels: $labels, os: $os, arch: $arch, github_repo: $repo, github_run_id: $run_id}')")
          echo "Response: $RESPONSE"
          echo "$RESPONSE" | jq -r '.id'
          echo "RUNNER_ID=$RUNNER_ID" >> $GITHUB_ENV
          echo "✅ Registered runner: $RUNNER_ID"

      - name: Start Self-Hosted Runner + Heartbeat
        run: |
          mkdir -p ~/actions-runner && cd ~/actions-runner
          curl -o actions-runner-linux-x64-2.335.1.tar.gz -L https://github.com/actions/runner/releases/download/v2.335.1/actions-runner-linux-x64-2.335.1.tar.gz
          tar xzf actions-runner-linux-x64-2.335.1.tar.gz
          ./config.sh --url https://github.com/${{ github.repository }} --token ${{ secrets.RUNNER_TOKEN }} --labels ${{ inputs.runner_labels }} --ephemeral --unattended --name "$RUNNER_ID"
          
          # Heartbeat loop
          (
            while true; do
              sleep 10
              curl -s -X POST http://localhost:8080/api/heartbeat \
                -H "Content-Type: application/json" \
                -d "{\"id\": \"$RUNNER_ID\"}" > /dev/null
            done
          ) &
          HEARTBEAT_PID=$!
          trap "kill $HEARTBEAT_PID 2>/dev/null; echo '🛑 Runner stopped'" EXIT INT TERM
          
          ./run.sh
        env:
          RUNNER_ID: ${{ env.RUNNER_ID }}

      - name: Show Connection Info
        if: always()
        run: |
          echo "=== Fleet Runner Ready ==="
          echo "📊 Dashboard: https://runners.cluster.qzz.io"
          echo "🏃 Runner ID: $RUNNER_ID"
          echo "Timeout: 360 minutes"