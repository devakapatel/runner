name: Fleet Runner with Dashboard

on:
  workflow_dispatch:
    inputs:
      runner_labels:
        description: 'Runner labels (comma-separated)'
        required: false
        default: 'ubuntu,runner,fleet'

jobs:
  fleet:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      TUNNEL_TOKEN: ${{ secrets.CLOUDFLARE_TUNNEL_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 jq curl

      - name: Start Fleet Tracker (Dashboard API)
        run: |
          python3 tracker.py &
          TRACKER_PID=$!
          # Wait for tracker to be ready
          for i in {1..30}; do
            if curl -s http://localhost:8080/health >/dev/null 2>&1; then
              echo "✅ Fleet Tracker ready"
              break
            fi
            sleep 1
          done
          kill -0 $TRACKER_PID || { echo "Tracker died"; exit 1; }

      - name: Start Cloudflare Tunnel (HTTP for Dashboard)
        run: |
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb
          cloudflared tunnel --no-autoupdate run --token "$TUNNEL_TOKEN" &
          TUNNEL_PID=$!
          # Wait for tunnel to establish connections
          for i in {1..30}; do
            if curl -s http://localhost:20241/metrics 2>/dev/null | grep -q "tunnel"; then
              echo "✅ Cloudflare Tunnel connected"
              break
            fi
            sleep 1
          done
          kill -0 $TUNNEL_PID || { echo "Tunnel died"; exit 1; }

      - name: Register Runner with Fleet Tracker
        run: |
          RUNNER_ID="gh-${{ github.run_id }}-${{ github.run_attempt }}-$(hostname)-$RANDOM"
          curl -s -X POST http://localhost:8080/api/register \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg id "$RUNNER_ID" \
              --arg labels "${{ inputs.runner_labels }}" \
              --arg os "$(uname -s)" \
              --arg arch "$(uname -m)" \
              --arg repo "${{ github.repository }}" \
              --arg run_id "${{ github.run_id }}" \
              '{id: $id, labels: $labels, os: $os, arch: $arch, github_repo: $repo, github_run_id: $run_id}')" \
            | jq -r '.id'
          echo "RUNNER_ID=$RUNNER_ID" >> $GITHUB_ENV
          echo "✅ Registered runner: $RUNNER_ID"

      - name: Start Self-Hosted Runner + Heartbeat Loop
        run: |
          # Download and configure GitHub Actions runner
          mkdir -p ~/actions-runner && cd ~/actions-runner
          curl -o actions-runner-linux-x64-2.335.1.tar.gz -L https://github.com/actions/runner/releases/download/v2.335.1/actions-runner-linux-x64-2.335.1.tar.gz
          tar xzf actions-runner-linux-x64-2.335.1.tar.gz
          ./config.sh --url https://github.com/${{ github.repository }} --token ${{ secrets.RUNNER_TOKEN }} --labels ${{ inputs.runner_labels }} --ephemeral --unattended --name "$RUNNER_ID"
          
          # Start heartbeat loop in background
          (
            while true; do
              sleep 10
              curl -s -X POST http://localhost:8080/api/heartbeat \
                -H "Content-Type: application/json" \
                -d "{\"id\": \"$RUNNER_ID\"}" > /dev/null
            done
          ) &
          HEARTBEAT_PID=$!
          
          # Cleanup on exit
          trap "kill $HEARTBEAT_PID 2>/dev/null; echo '🛑 Runner stopped'" EXIT INT TERM
          
          # Run the runner
          ./run.sh
        env:
          RUNNER_ID: ${{ env.RUNNER_ID }}

      - name: Show Connection Info
        if: always()
        run: |
          echo "=== Fleet Runner Ready ==="
          echo "📊 Dashboard: https://runners.cluster.qzz.io"
          echo "🏃 Runner ID: $RUNNER_ID"
          echo "Timeout: 360 minutes"